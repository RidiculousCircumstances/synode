version: 1

components:
  - name: domain
    path: src/synode/domain
    responsibilities:
      - Stable Synode value objects, report models, controlled vocabularies, and ports
      - No API, persistence, model-provider, tool, or runtime adapter imports
  - name: application
    path: src/synode/application
    responsibilities:
      - Use-case services, read-model builders, run report synthesis, validation orchestration, and workflow coordination
      - Depends on domain contracts and abstract ports, not concrete infrastructure adapters
  - name: infrastructure
    path: src/synode/infrastructure
    responsibilities:
      - Database, queue, model provider, tool, sandbox, MCP, OpenHands, logging, and observability adapters
      - Adapter implementations may depend on domain contracts and external libraries
  - name: interfaces
    path: src/synode/interfaces
    responsibilities:
      - CLI and FastAPI entrypoints
      - HTTP request/response routing, SSE streaming, and CLI command surfaces
      - Wires requests into application use cases through the infrastructure composition root
  - name: composition
    path: src/synode/infrastructure/composition.py
    responsibilities:
      - Startup assembly for Settings, DB, queue, model providers, tool gateway, MCP, sandbox, OpenHands, observability, and application services
      - No business workflow decisions
  - name: application-runtime
    path: src/synode/application
    responsibilities:
      - LangGraph orchestration wiring
      - Conversational threads, runs, approvals, operator requests, graph snapshots, profile binding, and structured run reports
      - Structured run read models, run report endpoint, SSE event stream with model/tool activity, run cancellation, and metrics endpoints
      - AgentGraph v2 node schema, code-based node contracts, node execution state, and backend registry with native LangGraph and optional external OpenHands execution for control and worker nodes
      - Operator planning gates, ambiguity interrupts, durable operator requests, and LangGraph checkpoint resume
      - Deterministic validation layer for operator questions, patch proposals, verification commands, and language-specific patch checks
  - name: web
    path: web
    responsibilities:
      - Next.js chat-first operator UI for threads, streamed agent output, structured run reports, approvals, workflow presets, graph diagnostics, timeline, artifacts, diff/tests, settings, and metrics
      - Runtime API base URL loading through env.js
  - name: agents
    path: src/synode/agents
    responsibilities:
      - Builtin seed role YAML files
      - Prompt-independent role metadata and tool allowlists seeded into DB-backed role records
  - name: docs
    path: docs
    responsibilities:
      - Project governance, verification, MCP, and guardrail contracts
  - name: fabricator
    path: src/synode/fabricator
    responsibilities:
      - Local developer workflow CLI for structured multi-expert planning and review
      - Synode-specific expert registry, routing, prompts, stance packs, templates, and run artifacts under docs/fabricator
      - Advisory handoff artifacts only; no commits, pushes, pull requests, or app runtime tool authority
  - name: tests
    path: tests
    responsibilities:
      - Unit and integration coverage for registry, tools, graph, API, and persistence
  - name: deploy
    path: docker-compose.yaml
    responsibilities:
      - Local Docker Compose deployment for Synode UI, API, worker, Postgres, and SearxNG
      - External host Ollama integration through API host networking
  - name: sandbox-deploy
    path: docker-compose.sandbox.yaml
    responsibilities:
      - Optional Docker Compose overlay that grants API and worker access to the Docker Engine socket for container sandbox execution
      - Host-to-container workspace path mapping for Docker-outside-of-Docker sandbox runs
  - name: observability-deploy
    path: docker-compose.observability.yaml
    responsibilities:
      - Optional local Langfuse stack for traces and model/tool observability
      - Separate Langfuse Postgres, ClickHouse, Redis, and MinIO services
  - name: docker
    path: Dockerfile
    responsibilities:
      - Container image for Synode API and CLI
      - Startup entrypoint that applies migrations before serving the API
  - name: docker-sandbox
    path: Dockerfile.sandbox
    responsibilities:
      - Minimal command execution image for the Docker sandbox backend
      - Python, pytest, uv, git, and ripgrep toolchain for isolated shell/Python runs
  - name: docker-ui
    path: Dockerfile.ui
    responsibilities:
      - Container image for Synode operator UI
      - Nginx runtime env.js generation for browser API configuration

rules:
  - Domain must not depend on application, infrastructure, API, CLI, persistence, runtime, tool, or model-provider implementations.
  - Application may depend on domain contracts and abstract ports, but not concrete infrastructure adapters.
  - Infrastructure may depend on domain, application ports, and external libraries, and is wired by the composition root.
  - Tool implementations must depend on policy and shared schemas, not on API entrypoints.
  - API and CLI must call the orchestration service, not duplicate graph behavior.
  - UI must consume structured API read models, run reports, and event display payloads; it must not parse `final_answer` or raw artifact JSON as a UI protocol.
  - MCP tools must pass the same policy and audit path as native tools.
  - MCP server configuration is DB-backed; nodes and external runtimes must use Synode's tool gateway or scoped HTTP MCP proxy instead of calling configured MCP servers directly.
  - Persistence owns mutable thread, run, event, approval, artifact, audit, and memory state.
  - Operator requests are distinct from tool approvals: operator requests resolve plan review, ambiguity, or state-edit decisions; approvals authorize concrete risky tool/runtime actions.
  - The run queue transports only `run_id` jobs; the `runs` table remains the source of truth for execution state.
  - Threads are the user-facing work unit; runs are immutable execution attempts inside threads.
  - Planning/operator pauses must use LangGraph interrupts and resume with `Command(resume=...)`; approval resumes may restart graph execution through artifact/runtime state and must not reuse stale completed checkpoints.
  - Agent role YAML files must not name concrete model IDs.
  - DB-backed model profiles, role profile bindings, and agent graph snapshots own runtime model routing.
  - AgentGraph v2 nodes have stable node ids, explicit node edges, node runtime bindings, and code-registered node contracts; role-level graph fields are not part of the API/runtime contract.
  - Agent graph node runtime bindings select execution backends; missing bindings mean `native_langgraph`.
  - External node backends must not own Synode run state, final review, approvals, tool policy, or audit authority.
  - Node backend bindings are valid only when the backend declares support for the node contract.
  - DB secrets must be encrypted with `SYNODE_SECRETS_KEY`; missing keys are explicit errors.
  - Runtime decisions must use structured model output or fail explicitly.
  - Structured model calls do not stream; unstructured model calls stream by default only when the selected provider explicitly supports streaming.
  - Fabricator is a developer workflow helper and must remain advisory; it must not bypass Synode tool policy, approval gates, or human-controlled commits and pushes.
  - Coding workflow mutations must pass patch proposal, approval, patch apply, verification, and review.
  - Rejected approvals and explicit stops must move runs to terminal cancelled state and unblock the thread.
  - API lists that can grow must accept pagination and apply limit/offset in persistence queries.
  - Langfuse must remain optional and fail startup when enabled without required credentials.
  - Docker sandbox runs must use one short-lived container per command and fail explicitly when the Docker Engine socket is unavailable.

entrypoints:
  - name: cli
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode
  - name: api
    path: src/synode/interfaces/http/app.py
    type: asgi
    command: uvicorn synode.interfaces.http.app:create_app --factory
  - name: db-upgrade
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode db upgrade
  - name: queue-upgrade
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode queue upgrade
  - name: worker
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode worker run
  - name: model-health
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode models health
  - name: fabricator
    path: src/synode/interfaces/cli.py
    type: cli
    command: synode fabricator
  - name: docker-compose
    path: docker-compose.yaml
    type: deployment
    command: docker compose up -d --build
  - name: docker-sandbox-compose
    path: docker-compose.sandbox.yaml
    type: deployment
    command: docker compose -f docker-compose.yaml -f docker-compose.sandbox.yaml up -d --build
  - name: docker-sandbox-build
    path: Dockerfile.sandbox
    type: deployment
    command: make docker-sandbox-build
  - name: ui-dev
    path: web
    type: frontend
    command: npm --prefix web run dev
  - name: observability-compose
    path: docker-compose.observability.yaml
    type: deployment
    command: make docker-observability-up

critical_flows:
  - name: run-task
    description: User message becomes a thread run, Procrastinate `run_id` dispatch, exact worker claim, graph execution, audited tool calls, reviewer output, and final answer.
  - name: coding-task
    description: Coding task flows through structured planning, inspection, deterministic patch validation, approval, patch apply, focused verification, and review.
  - name: structured-decision
    description: Supervisor and reviewer model calls must return schema-valid JSON or stop with an explicit error.
  - name: configurable-agent-graph
    description: Run creation resolves a DB AgentGraph v2, model profile bindings, node runtime backend bindings, node contracts, and role records into an immutable run snapshot before execution.
  - name: node-execution-backend
    description: Synode executes graph nodes through the snapshot-selected backend when that backend supports the node contract, records runtime_node_states, and validates external backend payloads back into Synode contracts before continuing graph execution.
  - name: approval
    description: Risky native or external runtime actions pause through Synode approval state before execution can resume.
  - name: operator-interrupt
    description: Plan review and backend/node ambiguity pause the run as `waiting_operator`, persist an operator request, and resume the same graph checkpoint after approve/edit/respond decisions or cancel on reject.
  - name: run-cancellation
    description: Operator stop, operator rejection, or approval rejection cancels the run, records a cancellation event, rejects pending approvals, cancels pending operator requests, and allows a new run in the same thread.
  - name: mcp-tool-call
    description: DB-backed MCP discovery registers tools as `mcp.<server>.<tool>`; native nodes call them through the in-process tool gateway, and external runtimes call only scoped Synode HTTP MCP proxy sessions that enforce allowlists, approvals, sandbox checks, and audit.
  - name: sandboxed-command-execution
    description: Risky shell, Python, filesystem write, and patch-apply mutations pass through the configured sandbox backend; Docker mode creates an isolated container with explicit network and resource limits.
  - name: fabricator-workflow
    description: Developer starts a local Fabricator run, records navigation evidence, dispatches Synode-specific experts, synthesizes findings, and produces human-reviewed handoff artifacts without committing or pushing.
  - name: operator-ui
    description: Browser UI creates and continues threads while monitoring structured run events, streamed agent output, graph state, approvals, artifacts, diffs, tests, and metrics.
  - name: observability
    description: Enabled Langfuse config emits run, node, model, and tool observations linked by run trace id.
