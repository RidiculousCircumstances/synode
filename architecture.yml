version: 1

components:
  - name: app
    path: src/synode
    responsibilities:
      - LangGraph orchestration runtime
      - CLI and FastAPI application entrypoints
      - Model provider abstraction and Ollama provider
      - Tool policy, native tools, and MCP bridge
      - Persistence, audit log, and approval state
  - name: agents
    path: src/synode/agents
    responsibilities:
      - Role registry YAML files
      - Prompt-independent role metadata and tool allowlists
  - name: docs
    path: docs
    responsibilities:
      - Project governance, verification, MCP, and guardrail contracts
  - name: tests
    path: tests
    responsibilities:
      - Unit and integration coverage for registry, tools, graph, API, and persistence
  - name: deploy
    path: docker-compose.yaml
    responsibilities:
      - Local Docker Compose deployment for Synode API, Postgres, and SearxNG
      - External host Ollama integration through API host networking
  - name: docker
    path: Dockerfile
    responsibilities:
      - Container image for Synode API and CLI
      - Startup entrypoint that applies migrations before serving the API

rules:
  - Orchestration may depend on model, tool, persistence, and registry modules.
  - Tool implementations must depend on policy and shared schemas, not on API entrypoints.
  - API and CLI must call the orchestration service, not duplicate graph behavior.
  - MCP tools must pass the same policy and audit path as native tools.
  - Persistence owns mutable run, event, approval, artifact, audit, and memory state.
  - Agent role YAML files must not name concrete model IDs.
  - Runtime decisions must use structured model output or fail explicitly.
  - Coding workflow mutations must pass patch proposal, approval, patch apply, verification, and review.

entrypoints:
  - name: cli
    path: src/synode/cli.py
    type: cli
    command: synode
  - name: api
    path: src/synode/api.py
    type: asgi
    command: uvicorn synode.api:create_app --factory
  - name: db-upgrade
    path: src/synode/cli.py
    type: cli
    command: synode db upgrade
  - name: model-health
    path: src/synode/cli.py
    type: cli
    command: synode models health
  - name: docker-compose
    path: docker-compose.yaml
    type: deployment
    command: docker compose up -d --build

critical_flows:
  - name: run-task
    description: User task becomes a persisted run, graph execution, audited tool calls, reviewer output, and final answer.
  - name: coding-task
    description: Coding task flows through structured planning, inspection, patch proposal, approval, patch apply, focused verification, and review.
  - name: structured-decision
    description: Supervisor and reviewer model calls must return schema-valid JSON or stop with an explicit error.
  - name: approval
    description: Risky tool requests pause through approval state before execution can resume.
  - name: mcp-tool-call
    description: MCP discovery and calls are normalized into governed tool invocations.
