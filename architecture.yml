version: 1

components:
  - name: app
    path: src/synode
    responsibilities:
      - LangGraph orchestration runtime
      - CLI and FastAPI application entrypoints
      - Model provider abstraction, DB-backed model profiles, Ollama provider, and OpenAI-compatible provider
      - Tool policy, native tools, and MCP bridge
      - Persistence, conversational threads, agent graphs, encrypted secrets, audit log, and approval state
      - Structured run read models, SSE event stream, run cancellation, and metrics endpoints
      - Optional Langfuse trace emission
  - name: web
    path: web
    responsibilities:
      - Next.js operator UI for threads, runs, approvals, graph, timeline, artifacts, diff/tests, and metrics
      - Runtime API base URL loading through env.js
  - name: agents
    path: src/synode/agents
    responsibilities:
      - Builtin seed role YAML files
      - Prompt-independent role metadata and tool allowlists seeded into DB-backed role records
  - name: docs
    path: docs
    responsibilities:
      - Project governance, verification, MCP, and guardrail contracts
  - name: tests
    path: tests
    responsibilities:
      - Unit and integration coverage for registry, tools, graph, API, and persistence
  - name: deploy
    path: docker-compose.yaml
    responsibilities:
      - Local Docker Compose deployment for Synode UI, API, Postgres, and SearxNG
      - External host Ollama integration through API host networking
  - name: observability-deploy
    path: docker-compose.observability.yaml
    responsibilities:
      - Optional local Langfuse stack for traces and model/tool observability
      - Separate Langfuse Postgres, ClickHouse, Redis, and MinIO services
  - name: docker
    path: Dockerfile
    responsibilities:
      - Container image for Synode API and CLI
      - Startup entrypoint that applies migrations before serving the API
  - name: docker-ui
    path: Dockerfile.ui
    responsibilities:
      - Container image for Synode operator UI
      - Nginx runtime env.js generation for browser API configuration

rules:
  - Orchestration may depend on model, tool, persistence, and registry modules.
  - Tool implementations must depend on policy and shared schemas, not on API entrypoints.
  - API and CLI must call the orchestration service, not duplicate graph behavior.
  - UI must consume structured API read models and events, not parse final_answer.
  - MCP tools must pass the same policy and audit path as native tools.
  - Persistence owns mutable thread, run, event, approval, artifact, audit, and memory state.
  - Threads are the user-facing work unit; runs are immutable execution attempts inside threads.
  - Agent role YAML files must not name concrete model IDs.
  - DB-backed model profiles, role profile bindings, and agent graph snapshots own runtime model routing.
  - DB secrets must be encrypted with `SYNODE_SECRETS_KEY`; missing keys are explicit errors.
  - Runtime decisions must use structured model output or fail explicitly.
  - Coding workflow mutations must pass patch proposal, approval, patch apply, verification, and review.
  - Rejected approvals and explicit stops must move runs to terminal cancelled state and unblock the thread.
  - API lists that can grow must accept pagination and apply limit/offset in persistence queries.
  - Langfuse must remain optional and fail startup when enabled without required credentials.

entrypoints:
  - name: cli
    path: src/synode/cli.py
    type: cli
    command: synode
  - name: api
    path: src/synode/api.py
    type: asgi
    command: uvicorn synode.api:create_app --factory
  - name: db-upgrade
    path: src/synode/cli.py
    type: cli
    command: synode db upgrade
  - name: model-health
    path: src/synode/cli.py
    type: cli
    command: synode models health
  - name: docker-compose
    path: docker-compose.yaml
    type: deployment
    command: docker compose up -d --build
  - name: ui-dev
    path: web
    type: frontend
    command: npm --prefix web run dev
  - name: observability-compose
    path: docker-compose.observability.yaml
    type: deployment
    command: make docker-observability-up

critical_flows:
  - name: run-task
    description: User message becomes a thread run, graph execution, audited tool calls, reviewer output, and final answer.
  - name: coding-task
    description: Coding task flows through structured planning, inspection, patch proposal, approval, patch apply, focused verification, and review.
  - name: structured-decision
    description: Supervisor and reviewer model calls must return schema-valid JSON or stop with an explicit error.
  - name: configurable-agent-graph
    description: Run creation resolves a DB agent graph, model profile bindings, and role records into an immutable run snapshot before LangGraph execution.
  - name: approval
    description: Risky tool requests pause through approval state before execution can resume.
  - name: run-cancellation
    description: Operator stop or approval rejection cancels the run, records a cancellation event, rejects pending approvals, and allows a new run in the same thread.
  - name: mcp-tool-call
    description: MCP discovery and calls are normalized into governed tool invocations.
  - name: operator-ui
    description: Browser UI creates and continues threads while monitoring structured run events, graph state, approvals, artifacts, diffs, tests, and metrics.
  - name: observability
    description: Enabled Langfuse config emits run, node, model, and tool observations linked by run trace id.
