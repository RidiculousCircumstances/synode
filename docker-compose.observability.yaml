services:
  api:
    depends_on:
      langfuse-web:
        condition: service_started
    environment:
      SYNODE_LANGFUSE_ENABLED: "true"
      SYNODE_LANGFUSE_BASE_URL: http://127.0.0.1:${LANGFUSE_PORT:-3001}
      SYNODE_LANGFUSE_PUBLIC_KEY: ${SYNODE_LANGFUSE_PUBLIC_KEY:?set SYNODE_LANGFUSE_PUBLIC_KEY in .env.observability}
      SYNODE_LANGFUSE_SECRET_KEY: ${SYNODE_LANGFUSE_SECRET_KEY:?set SYNODE_LANGFUSE_SECRET_KEY in .env.observability}

  worker:
    depends_on:
      langfuse-web:
        condition: service_started
    environment:
      SYNODE_LANGFUSE_ENABLED: "true"
      SYNODE_LANGFUSE_BASE_URL: http://127.0.0.1:${LANGFUSE_PORT:-3001}
      SYNODE_LANGFUSE_PUBLIC_KEY: ${SYNODE_LANGFUSE_PUBLIC_KEY:?set SYNODE_LANGFUSE_PUBLIC_KEY in .env.observability}
      SYNODE_LANGFUSE_SECRET_KEY: ${SYNODE_LANGFUSE_SECRET_KEY:?set SYNODE_LANGFUSE_SECRET_KEY in .env.observability}

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    profiles: ["observability"]
    restart: unless-stopped
    depends_on: &langfuse-depends-on
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LANGFUSE_WORKER_PORT:-3030}:3030"
    environment: &langfuse-worker-env
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:?set LANGFUSE_POSTGRES_PASSWORD in .env.observability}@langfuse-postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT in .env.observability}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?set LANGFUSE_ENCRYPTION_KEY in .env.observability}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-false}
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD in .env.observability}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_USE_OCI_NATIVE_OBJECT_STORAGE: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:?set LANGFUSE_MINIO_PASSWORD in .env.observability}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:?set LANGFUSE_MINIO_PASSWORD in .env.observability}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://127.0.0.1:19090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: exports/
      LANGFUSE_S3_BATCH_EXPORT_REGION: auto
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT: http://127.0.0.1:19090
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:?set LANGFUSE_MINIO_PASSWORD in .env.observability}
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH:?set LANGFUSE_REDIS_AUTH in .env.observability}
      LANGFUSE_BULLMQ_SKIP_REDIS_VERSION_CHECK: "false"
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    profiles: ["observability"]
    restart: unless-stopped
    depends_on: *langfuse-depends-on
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    environment:
      <<: *langfuse-worker-env
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?set LANGFUSE_NEXTAUTH_SECRET in .env.observability}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-synode-local}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Synode Local}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-synode}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-Synode}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${SYNODE_LANGFUSE_PUBLIC_KEY:?set SYNODE_LANGFUSE_PUBLIC_KEY in .env.observability}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${SYNODE_LANGFUSE_SECRET_KEY:?set SYNODE_LANGFUSE_SECRET_KEY in .env.observability}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:?set LANGFUSE_INIT_USER_EMAIL in .env.observability}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-synode}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?set LANGFUSE_INIT_USER_PASSWORD in .env.observability}

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server:25
    profiles: ["observability"]
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD in .env.observability}
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:${LANGFUSE_CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "127.0.0.1:${LANGFUSE_CLICKHOUSE_NATIVE_PORT:-19000}:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  langfuse-minio:
    image: cgr.dev/chainguard/minio:latest
    profiles: ["observability"]
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD:?set LANGFUSE_MINIO_PASSWORD in .env.observability}
    ports:
      - "${LANGFUSE_MINIO_PORT:-19090}:9000"
      - "127.0.0.1:${LANGFUSE_MINIO_CONSOLE_PORT:-19091}:9001"
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  langfuse-redis:
    image: docker.io/redis:7
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      LANGFUSE_REDIS_AUTH: ${LANGFUSE_REDIS_AUTH:?set LANGFUSE_REDIS_AUTH in .env.observability}
    command: >
      --requirepass ${LANGFUSE_REDIS_AUTH:?set LANGFUSE_REDIS_AUTH in .env.observability}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:${LANGFUSE_REDIS_PORT:-16379}:6379"
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${LANGFUSE_REDIS_AUTH}\" ping | grep PONG"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-postgres:
    image: docker.io/postgres:17-alpine
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:?set LANGFUSE_POSTGRES_PASSWORD in .env.observability}
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${LANGFUSE_POSTGRES_PORT:-15433}:5432"
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  langfuse-postgres-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
