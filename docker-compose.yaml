services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: synode-ui:local
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${SYNODE_UI_PORT:-3000}:3000"
    environment:
      SYNODE_UI_API_BASE_URL: ${SYNODE_UI_API_BASE_URL:-auto}
      SYNODE_UI_API_PORT: ${SYNODE_UI_API_PORT:-8787}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: synode:local
    command: ["serve"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
    network_mode: host
    environment:
      SYNODE_DATABASE_URL: postgresql+asyncpg://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode
      SYNODE_CHECKPOINT_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_RUN_QUEUE_TRANSPORT: procrastinate
      SYNODE_QUEUE_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_QUEUE_NAME: ${SYNODE_QUEUE_NAME:-synode_runs}
      SYNODE_ENABLE_POSTGRES_CHECKPOINTER: "true"
      SYNODE_SEARXNG_URL: http://127.0.0.1:${SYNODE_SEARXNG_PORT:-18080}
      SYNODE_MODEL_PROVIDER: ollama
      SYNODE_OLLAMA_BASE_URL: ${SYNODE_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      SYNODE_OLLAMA_MODEL: ${SYNODE_OLLAMA_MODEL:-qwen2.5-coder:7b}
      SYNODE_MODEL_TIMEOUT_SECONDS: ${SYNODE_MODEL_TIMEOUT_SECONDS:-60}
      SYNODE_PORT: ${SYNODE_API_PORT:-8787}
      SYNODE_WORKSPACE_ALLOWLIST: /workspace,/app/samples,/tmp
      SYNODE_MCP_CONFIG_PATH: /app/.mcp.json
      SYNODE_SANDBOX_BACKEND: ${SYNODE_SANDBOX_BACKEND:-process}
      SYNODE_SKIP_DB_UPGRADE: "1"
    volumes:
      - ./var/workspaces:/workspace
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: synode:local
    command: ["worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
    network_mode: host
    environment:
      SYNODE_DATABASE_URL: postgresql+asyncpg://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode
      SYNODE_CHECKPOINT_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_RUN_QUEUE_TRANSPORT: procrastinate
      SYNODE_QUEUE_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_QUEUE_NAME: ${SYNODE_QUEUE_NAME:-synode_runs}
      SYNODE_ENABLE_POSTGRES_CHECKPOINTER: "true"
      SYNODE_SEARXNG_URL: http://127.0.0.1:${SYNODE_SEARXNG_PORT:-18080}
      SYNODE_MODEL_PROVIDER: ollama
      SYNODE_OLLAMA_BASE_URL: ${SYNODE_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      SYNODE_OLLAMA_MODEL: ${SYNODE_OLLAMA_MODEL:-qwen2.5-coder:7b}
      SYNODE_MODEL_TIMEOUT_SECONDS: ${SYNODE_MODEL_TIMEOUT_SECONDS:-60}
      SYNODE_WORKSPACE_ALLOWLIST: /workspace,/app/samples,/tmp
      SYNODE_MCP_CONFIG_PATH: /app/.mcp.json
      SYNODE_SANDBOX_BACKEND: ${SYNODE_SANDBOX_BACKEND:-process}
      SYNODE_SKIP_DB_UPGRADE: "1"
    volumes:
      - ./var/workspaces:/workspace
    healthcheck:
      test: ["CMD-SHELL", "synode runtime status --check >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: synode:local
    command: ["db-upgrade"]
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host
    environment:
      SYNODE_DATABASE_URL: postgresql+asyncpg://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode
      SYNODE_CHECKPOINT_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_RUN_QUEUE_TRANSPORT: procrastinate
      SYNODE_QUEUE_DATABASE_URL: postgresql://synode:synode@127.0.0.1:${SYNODE_POSTGRES_PORT:-15432}/synode?sslmode=disable
      SYNODE_QUEUE_NAME: ${SYNODE_QUEUE_NAME:-synode_runs}
      SYNODE_WORKSPACE_ALLOWLIST: /workspace,/app/samples,/tmp
      SYNODE_MCP_CONFIG_PATH: /app/.mcp.json
      SYNODE_SANDBOX_BACKEND: ${SYNODE_SANDBOX_BACKEND:-process}
    volumes:
      - ./var/workspaces:/workspace
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: synode
      POSTGRES_PASSWORD: synode
      POSTGRES_DB: synode
    ports:
      - "${SYNODE_POSTGRES_PORT:-15432}:5432"
    volumes:
      - synode-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synode -d synode"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SYNODE_SEARXNG_PORT:-18080}:8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:18080/
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  synode-postgres:
